<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#ffffff"/>
  <rect width="800" height="48" fill="#742774"/>
  <text x="20" y="30" font-family="Segoe UI, Arial" font-size="14" fill="white" font-weight="600">Copilot Studio - Instructions</text>
  <rect x="40" y="70" width="720" height="300" rx="8" fill="#fff" stroke="#e0e0e0" stroke-width="1"/>
  <text x="60" y="100" font-family="Segoe UI, Arial" font-size="13" fill="#333" font-weight="600">Instructions</text>
  <rect x="60" y="110" width="680" height="220" rx="4" fill="#1e1e1e"/>
  <text x="72" y="138" font-family="Consolas, monospace" font-size="12" fill="#C586C0">## Knowledge Sources</text>
  <text x="72" y="160" font-family="Consolas, monospace" font-size="11" fill="#9CDCFE">- Use ONLY information from connected</text>
  <text x="72" y="177" font-family="Consolas, monospace" font-size="11" fill="#9CDCFE">  sources to answer questions.</text>
  <text x="72" y="200" font-family="Consolas, monospace" font-size="11" fill="#9CDCFE">- If the information is not in the sources,</text>
  <text x="72" y="217" font-family="Consolas, monospace" font-size="11" fill="#9CDCFE">  say: "I couldn't find that information"</text>
  <text x="72" y="240" font-family="Consolas, monospace" font-size="11" fill="#9CDCFE">- Always cite the source of information</text>
  <text x="72" y="257" font-family="Consolas, monospace" font-size="11" fill="#9CDCFE">  when possible.</text>
  <rect x="600" y="340" width="120" height="28" rx="6" fill="#742774"/>
  <text x="660" y="359" font-family="Segoe UI, Arial" font-size="12" fill="white" text-anchor="middle">Save</text>
</svg>